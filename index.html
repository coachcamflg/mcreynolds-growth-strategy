<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>McReynolds — Strategy Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0A0A0A;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            -webkit-font-smoothing: antialiased;
        }
        .gate-container {
            max-width: 420px;
            width: 100%;
            text-align: center;
        }
        .brand-mark {
            width: 64px;
            height: 64px;
            border-radius: 16px;
            background: linear-gradient(135deg, #008080, #20B2AA);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 1.5rem;
            font-weight: 800;
            color: #fff;
            letter-spacing: -0.03em;
        }
        .client-name {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }
        .protected-msg {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
        .lock-icon {
            display: inline-block;
            margin-right: 0.35rem;
            opacity: 0.6;
        }
        .input-group {
            position: relative;
            margin-bottom: 1rem;
        }
        .input-group input {
            width: 100%;
            padding: 14px 18px;
            background: #111;
            border: 1px solid #1A1A1A;
            border-radius: 10px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-group input:focus {
            border-color: #008080;
        }
        .input-group input::placeholder {
            color: #555;
        }
        .submit-btn {
            width: 100%;
            padding: 14px 18px;
            background: #008080;
            border: none;
            border-radius: 10px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }
        .submit-btn:hover {
            opacity: 0.9;
        }
        .submit-btn:active {
            transform: scale(0.98);
        }
        .error-msg {
            color: #ff4444;
            font-size: 0.82rem;
            margin-top: 0.75rem;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .error-msg.visible {
            opacity: 1;
        }
        .footer-note {
            margin-top: 3rem;
            color: #444;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
    <div class="gate-container">
        <div class="brand-mark">MR</div>
        <div class="client-name">McReynolds Growth Strategy</div>
        <div class="protected-msg">
            <span class="lock-icon">&#128274;</span>This document is protected
        </div>
        <form id="gate-form" onsubmit="return handleSubmit(event)">
            <div class="input-group">
                <input type="password" id="password-input" placeholder="Enter access password" autocomplete="off" autofocus>
            </div>
            <button type="submit" class="submit-btn">Access Strategy</button>
        </form>
        <div class="error-msg" id="error-msg">Incorrect password. Please try again.</div>
        <div class="footer-note">Forward Learning Group, LLC</div>
    </div>

    <script>
        const HASH = '472383586dc22240165bd12894c1ba3ad496303716f46cdc52029d2ffae9ccd2';
        const TARGET = 'mcreynolds-complete-strategy.html';
        const SESSION_KEY = 'flg_strategy_access_mcreynolds';

        // Check sessionStorage on load
        if (sessionStorage.getItem(SESSION_KEY) === 'granted') {
            window.location.replace(TARGET);
        }

        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function handleSubmit(e) {
            e.preventDefault();
            const input = document.getElementById('password-input').value;
            const hashed = await hashPassword(input);
            if (hashed === HASH) {
                sessionStorage.setItem(SESSION_KEY, 'granted');
                window.location.replace(TARGET);
            } else {
                document.getElementById('error-msg').classList.add('visible');
                document.getElementById('password-input').value = '';
                document.getElementById('password-input').focus();
                setTimeout(() => {
                    document.getElementById('error-msg').classList.remove('visible');
                }, 3000);
            }
            return false;
        }
    </script>
</body>
</html>
