<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="McReynolds Real Estate - Social Media Strategy Dashboard">
    <title>McReynolds Real Estate — Social Media Strategy Dashboard</title>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Chart.js 4.5.1 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>

    <style>
        /* ========================================
           GLOBAL RESET & VARIABLES
           ======================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Dark theme palette */
            --bg-primary: #0A0A0A;
            --bg-card: #111111;
            --bg-card-inner: #0F0F0F;
            --border-color: #1A1A1A;
            --text-primary: #FFFFFF;
            --text-secondary: #A0A0A0;
            --text-muted: #606060;

            /* Brand colors - McReynolds Real Estate Teal Palette */
            --brand-primary: #008080;
            --brand-secondary: #00B3B3;
            --brand-tertiary: #D4A843;
            --brand-accent: #20B2AA;

            /* Status colors */
            --status-success: #10B981;
            --status-warning: #F59E0B;
            --status-error: #EF4444;
            --status-info: #3B82F6;

            /* Spacing & Sizing */
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 12px;
            --spacing-lg: 16px;
            --spacing-xl: 24px;
            --spacing-2xl: 32px;

            /* Border radius */
            --radius-card: 12px;
            --radius-inner: 8px;

            /* Transitions */
            --transition-fast: 0.15s ease;
            --transition-base: 0.3s ease;
            --transition-slow: 0.5s ease;

            /* Backdrop blur */
            --blur-sm: blur(8px);
            --blur-md: blur(12px);
        }

        html, body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        body {
            padding: 0;
            margin: 0;
        }

        /* ========================================
           TYPOGRAPHY
           ======================================== */
        h1, h2, h3, h4, h5, h6 {
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: var(--spacing-lg);
        }

        h1 { font-size: 2.5rem; }
        h2 { font-size: 2rem; }
        h3 { font-size: 1.5rem; }
        h4 { font-size: 1.25rem; }
        h5 { font-size: 1.125rem; }
        h6 { font-size: 1rem; }

        p {
            margin-bottom: var(--spacing-md);
            color: var(--text-secondary);
        }

        a {
            color: var(--brand-primary);
            text-decoration: none;
            transition: color var(--transition-base);
        }

        a:hover {
            color: var(--brand-accent);
        }

        /* ========================================
           STICKY HEADER WITH GRADIENT BRANDING
           ======================================== */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: linear-gradient(180deg, #1A1A1A 0%, #0A0A0A 100%);
            backdrop-filter: var(--blur-md);
            border-bottom: 1px solid var(--border-color);
            padding: var(--spacing-lg) var(--spacing-xl);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .header-container {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: var(--spacing-xl);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #00B3B3, #008080);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            min-width: fit-content;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #00B3B3, #008080);
            border-radius: var(--radius-card);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--bg-primary);
            font-weight: 800;
            font-size: 1.25rem;
        }

        .header-title {
            flex: 1;
            text-align: center;
        }

        .header-title h1 {
            font-size: 1.75rem;
            margin: 0;
            background: linear-gradient(135deg, var(--text-primary), var(--text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-title p {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin: var(--spacing-xs) 0 0 0;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: var(--spacing-lg);
        }

        .header-date {
            text-align: right;
            font-size: 0.875rem;
        }

        .header-date .date {
            color: var(--text-primary);
            font-weight: 600;
        }

        .header-date .time {
            color: var(--text-muted);
            display: block;
            margin-top: var(--spacing-xs);
        }

        /* ========================================
           MAIN CONTAINER
           ======================================== */
        main {
            max-width: 1600px;
            margin: 0 auto;
            padding: var(--spacing-xl);
        }

        .section {
            margin-bottom: var(--spacing-2xl);
        }

        .section-title {
            font-size: 1.375rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: var(--spacing-lg);
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: linear-gradient(180deg, #008080, #00B3B3);
            border-radius: 2px;
        }

        /* ========================================
           STRATEGY TIMELINE
           ======================================== */
        .timeline {
            position: relative;
            padding: var(--spacing-xl);
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-card);
            margin-bottom: var(--spacing-2xl);
        }

        .timeline-header {
            margin-bottom: var(--spacing-xl);
        }

        .timeline-header h3 {
            margin-bottom: var(--spacing-md);
        }

        /* Progress bar */
        .progress-container {
            margin-bottom: var(--spacing-lg);
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: var(--spacing-md);
            font-size: 0.875rem;
        }

        .progress-label .label-text {
            color: var(--text-secondary);
        }

        .progress-label .progress-percent {
            color: var(--brand-primary);
            font-weight: 600;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--bg-card-inner);
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #00B3B3, #008080, #006666);
            border-radius: 4px;
            width: {{PROGRESS_PERCENT}}%;
            transition: width var(--transition-slow);
            box-shadow: 0 0 20px rgba(0, 128, 128, 0.5);
            animation: progress-glow 2s ease-in-out infinite;
        }

        @keyframes progress-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(0, 128, 128, 0.5); }
            50% { box-shadow: 0 0 30px rgba(0, 128, 128, 0.8); }
        }

        /* Timeline phases */
        .timeline-phases {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--spacing-lg);
            margin-top: var(--spacing-xl);
        }

        .phase-card {
            padding: var(--spacing-lg);
            background: linear-gradient(135deg, var(--bg-card-inner), var(--bg-card));
            border: 1px solid var(--border-color);
            border-radius: var(--radius-card);
            position: relative;
            overflow: hidden;
            transition: all var(--transition-base);
        }

        .phase-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #008080, #00B3B3);
            opacity: 0;
            transition: opacity var(--transition-base);
        }

        .phase-card:hover {
            border-color: var(--brand-primary);
            box-shadow: 0 0 20px rgba(0, 128, 128, 0.2);
            transform: translateY(-4px);
        }

        .phase-card:hover::before {
            opacity: 1;
        }

        .phase-card .phase-label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--brand-primary);
            margin-bottom: var(--spacing-sm);
        }

        .phase-card .phase-title {
            font-weight: 700;
            margin-bottom: var(--spacing-sm);
            color: var(--text-primary);
        }

        .phase-card .phase-date {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        /* Timeline markers */
        .milestone-marker {
            display: inline-block;
            width: 12px;
            height: 12px;
            background: var(--brand-primary);
            border-radius: 50%;
            margin-right: var(--spacing-sm);
            position: relative;
        }

        .milestone-marker::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 120%;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-card-inner);
            border: 1px solid var(--border-color);
            padding: var(--spacing-sm) var(--spacing-md);
            border-radius: var(--radius-inner);
            font-size: 0.75rem;
            color: var(--text-secondary);
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition-base);
            z-index: 10;
        }

        .milestone-marker:hover::after {
            opacity: 1;
        }

        /* ========================================
           KPI CARDS (4-COLUMN)
           ======================================== */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: var(--spacing-lg);
            margin-bottom: var(--spacing-2xl);
        }

        .kpi-card {
            padding: var(--spacing-lg);
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-card);
            position: relative;
            overflow: hidden;
            transition: all var(--transition-base);
        }

        .kpi-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(0, 128, 128, 0.1), transparent);
            opacity: 0;
            transition: opacity var(--transition-base);
        }

        .kpi-card:hover {
            border-color: var(--brand-primary);
            background: linear-gradient(135deg, var(--bg-card), var(--bg-card-inner));
            box-shadow: 0 8px 32px rgba(0, 128, 128, 0.15);
            transform: translateY(-4px);
        }

        .kpi-card:hover::before {
            opacity: 1;
        }

        .kpi-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: var(--spacing-lg);
            position: relative;
            z-index: 1;
        }

        .kpi-title {
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
        }

        .kpi-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--bg-card-inner), var(--bg-primary));
            border: 1px solid var(--border-color);
            border-radius: var(--radius-inner);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }

        .kpi-value {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: var(--spacing-md);
            background: linear-gradient(135deg, var(--text-primary), var(--text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .kpi-change {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            font-size: 0.875rem;
            margin-bottom: var(--spacing-lg);
        }

        .kpi-change.positive {
            color: var(--status-success);
        }

        .kpi-change.negative {
            color: var(--status-error);
        }

        .kpi-change.neutral {
            color: var(--text-muted);
        }

        /* KPI progress bar */
        .kpi-progress {
            margin-top: var(--spacing-lg);
            padding-top: var(--spacing-lg);
            border-top: 1px solid var(--border-color);
        }

        .kpi-progress-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: var(--spacing-sm);
            display: flex;
            justify-content: space-between;
        }

        .kpi-progress-bar {
            width: 100%;
            height: 6px;
            background: var(--bg-card-inner);
            border-radius: 3px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .kpi-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #008080, #00B3B3);
            border-radius: 3px;
            transition: width var(--transition-base);
        }

        /* Expandable breakdown */
        .kpi-breakdown-toggle {
            width: 100%;
            padding: var(--spacing-md);
            margin-top: var(--spacing-lg);
            background: var(--bg-card-inner);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-inner);
            color: var(--text-secondary);
            font-size: 0.875rem;
            cursor: pointer;
            transition: all var(--transition-base);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .kpi-breakdown-toggle:hover {
            background: var(--bg-card);
            color: var(--text-primary);
            border-color: var(--brand-primary);
        }

        .kpi-breakdown-toggle.active {
            background: var(--bg-card);
            color: var(--brand-primary);
            border-color: var(--brand-primary);
        }

        .kpi-breakdown {
            margin-top: var(--spacing-md);
            max-height: 0;
            overflow: hidden;
            transition: max-height var(--transition-base);
        }

        .kpi-breakdown.active {
            max-height: 500px;
        }

        .breakdown-item {
            display: flex;
            justify-content: space-between;
            padding: var(--spacing-sm) 0;
            font-size: 0.875rem;
            border-bottom: 1px solid var(--border-color);
        }

        .breakdown-item:last-child {
            border-bottom: none;
        }

        .breakdown-label {
            color: var(--text-secondary);
        }

        .breakdown-value {
            color: var(--text-primary);
            font-weight: 600;
        }

        /* ========================================
           CHARTS ROW (Doughnut + Line)
           ======================================== */
        .charts-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: var(--spacing-lg);
            margin-bottom: var(--spacing-2xl);
        }

        .chart-card {
            padding: var(--spacing-lg);
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-card);
            position: relative;
        }

        .chart-card h3 {
            font-size: 1.125rem;
            margin-bottom: var(--spacing-lg);
        }

        .chart-wrapper {
            position: relative;
            height: 300px;
        }

        /* ========================================
           CONTENT CALENDAR
           ======================================== */
        .content-calendar {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-card);
            padding: var(--spacing-lg);
            margin-bottom: var(--spacing-2xl);
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-xl);
        }

        .calendar-nav {
            display: flex;
            gap: var(--spacing-md);
        }

        .calendar-nav button {
            width: 40px;
            height: 40px;
            background: var(--bg-card-inner);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-inner);
            color: var(--text-primary);
            cursor: pointer;
            transition: all var(--transition-base);
            font-size: 1.25rem;
        }

        .calendar-nav button:hover {
            background: var(--bg-card);
            border-color: var(--brand-primary);
            color: var(--brand-primary);
        }

        .content-cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: var(--spacing-lg);
        }

        .content-card {
            padding: var(--spacing-lg);
            background: linear-gradient(135deg, var(--bg-card-inner), var(--bg-card));
            border: 1px solid var(--border-color);
            border-radius: var(--radius-card);
            position: relative;
            overflow: hidden;
            transition: all var(--transition-base);
            display: flex;
            flex-direction: column;
        }

        .content-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #008080, #00B3B3);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform var(--transition-base);
        }

        .content-card:hover {
            border-color: var(--brand-primary);
            box-shadow: 0 8px 32px rgba(0, 128, 128, 0.15);
            transform: translateY(-4px);
        }

        .content-card:hover::before {
            transform: scaleX(1);
        }

        .content-title {
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: var(--spacing-md);
            flex: 1;
        }

        .content-badges {
            display: flex;
            flex-wrap: wrap;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-md);
        }

        .badge {
            padding: var(--spacing-xs) var(--spacing-md);
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-inner);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-secondary);
            white-space: nowrap;
            transition: all var(--transition-base);
        }

        .badge:hover {
            border-color: var(--brand-primary);
            color: var(--brand-primary);
            background: rgba(0, 128, 128, 0.1);
        }

        .badge.platform-instagram {
            border-color: #E1306C;
            color: #E1306C;
        }

        .badge.platform-twitter {
            border-color: #1DA1F2;
            color: #1DA1F2;
        }

        .badge.platform-facebook {
            border-color: #1877F2;
            color: #1877F2;
        }

        .badge.platform-linkedin {
            border-color: #0A66C2;
            color: #0A66C2;
        }

        .badge.platform-tiktok {
            border-color: #25F4EE;
            color: #25F4EE;
        }

        .badge.pillar-awareness {
            border-color: var(--brand-primary);
            color: var(--brand-primary);
        }

        .badge.pillar-engagement {
            border-color: var(--brand-tertiary);
            color: var(--brand-tertiary);
        }

        .badge.pillar-conversion {
            border-color: var(--status-success);
            color: var(--status-success);
        }

        .badge.status-published {
            background: rgba(16, 185, 129, 0.1);
            border-color: var(--status-success);
            color: var(--status-success);
        }

        .badge.status-scheduled {
            background: rgba(59, 130, 246, 0.1);
            border-color: var(--status-info);
            color: var(--status-info);
        }

        .badge.status-draft {
            background: rgba(96, 96, 96, 0.1);
            border-color: var(--text-muted);
            color: var(--text-muted);
        }

        .content-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.875rem;
            color: var(--text-muted);
            padding-top: var(--spacing-md);
            border-top: 1px solid var(--border-color);
        }

        /* ========================================
           STRATEGY DOCUMENTS
           ======================================== */
        .documents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: var(--spacing-lg);
            margin-bottom: var(--spacing-2xl);
        }

        .document-card {
            padding: var(--spacing-lg);
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-card);
            cursor: pointer;
            transition: all var(--transition-base);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 200px;
        }

        .document-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(0, 128, 128, 0.1), rgba(0, 179, 179, 0.1));
            opacity: 0;
            transition: opacity var(--transition-base);
        }

        .document-card:hover {
            border-color: var(--brand-primary);
            box-shadow: 0 12px 40px rgba(0, 128, 128, 0.2);
            transform: translateY(-8px);
        }

        .document-card:hover::after {
            opacity: 1;
        }

        .document-icon {
            font-size: 3rem;
            margin-bottom: var(--spacing-lg);
            position: relative;
            z-index: 1;
        }

        .document-name {
            font-weight: 700;
            color: var(--text-primary);
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .document-type {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-top: var(--spacing-sm);
            position: relative;
            z-index: 1;
        }

        /* ========================================
           DELIVERABLES CHECKLIST
           ======================================== */
        .deliverables {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-card);
            padding: var(--spacing-lg);
            margin-bottom: var(--spacing-2xl);
        }

        .deliverables-header {
            margin-bottom: var(--spacing-lg);
        }

        .deliverables-progress {
            margin-bottom: var(--spacing-xl);
        }

        .deliverables-progress .progress-label {
            margin-bottom: var(--spacing-md);
        }

        .deliverables-list {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
        }

        .deliverable-item {
            display: flex;
            align-items: center;
            gap: var(--spacing-lg);
            padding: var(--spacing-md);
            background: var(--bg-card-inner);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-inner);
            transition: all var(--transition-base);
            position: relative;
        }

        .deliverable-item:hover {
            border-color: var(--brand-primary);
            background: linear-gradient(135deg, var(--bg-card-inner), var(--bg-card));
        }

        .deliverable-item.completed {
            background: rgba(16, 185, 129, 0.05);
            border-color: rgba(16, 185, 129, 0.3);
        }

        .deliverable-checkbox {
            width: 24px;
            height: 24px;
            min-width: 24px;
            cursor: pointer;
            accent-color: var(--brand-primary);
        }

        .deliverable-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: var(--spacing-sm);
        }

        .deliverable-title {
            font-weight: 600;
            color: var(--text-primary);
            text-decoration: none;
            transition: color var(--transition-base);
        }

        .deliverable-item.completed .deliverable-title {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .deliverable-description {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .deliverable-date {
            font-size: 0.75rem;
            color: var(--text-muted);
            white-space: nowrap;
        }

        /* ========================================
           REVENUE PROJECTIONS
           ======================================== */
        .revenue-section {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-card);
            padding: var(--spacing-lg);
            margin-bottom: var(--spacing-2xl);
        }

        .revenue-header {
            margin-bottom: var(--spacing-xl);
        }

        .revenue-header h3 {
            margin-bottom: var(--spacing-md);
        }

        .revenue-filters {
            display: flex;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-lg);
        }

        .revenue-filter-btn {
            padding: var(--spacing-sm) var(--spacing-md);
            background: var(--bg-card-inner);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-inner);
            color: var(--text-secondary);
            font-size: 0.875rem;
            cursor: pointer;
            transition: all var(--transition-base);
        }

        .revenue-filter-btn:hover,
        .revenue-filter-btn.active {
            background: var(--bg-card);
            border-color: var(--brand-primary);
            color: var(--brand-primary);
        }

        .revenue-chart {
            position: relative;
            height: 300px;
            margin-bottom: var(--spacing-xl);
        }

        .revenue-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--spacing-lg);
        }

        .revenue-stat {
            padding: var(--spacing-lg);
            background: var(--bg-card-inner);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-inner);
            text-align: center;
        }

        .revenue-stat-label {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: var(--spacing-sm);
        }

        .revenue-stat-value {
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--text-primary);
        }

        /* ========================================
           STRATEGY IDEAS / CHAT SECTION
           ======================================== */
        .ideas-container {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-card);
            padding: var(--spacing-lg);
            margin-bottom: var(--spacing-2xl);
        }

        .ideas-header {
            margin-bottom: var(--spacing-lg);
        }

        .ideas-header h3 {
            margin-bottom: var(--spacing-sm);
        }

        .ideas-header p {
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .ideas-input-row {
            display: flex;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-xl);
        }

        .ideas-input {
            flex: 1;
            padding: var(--spacing-md) var(--spacing-lg);
            background: var(--bg-card-inner);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-inner);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            resize: none;
            min-height: 60px;
            transition: all var(--transition-base);
        }

        .ideas-input:focus {
            outline: none;
            border-color: var(--brand-primary);
            background: var(--bg-card-inner);
            box-shadow: 0 0 20px rgba(0, 128, 128, 0.3);
        }

        .ideas-input::placeholder {
            color: var(--text-muted);
        }

        .ideas-submit {
            padding: var(--spacing-md) var(--spacing-xl);
            background: linear-gradient(135deg, #008080, #00B3B3);
            border: none;
            border-radius: var(--radius-inner);
            color: var(--bg-primary);
            font-weight: 700;
            font-size: 0.875rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: all var(--transition-base);
            white-space: nowrap;
            height: fit-content;
        }

        .ideas-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 128, 128, 0.4);
        }

        .ideas-submit:active {
            transform: translateY(0);
        }

        .ideas-list {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
            max-height: 600px;
            overflow-y: auto;
        }

        .ideas-list::-webkit-scrollbar {
            width: 6px;
        }

        .ideas-list::-webkit-scrollbar-track {
            background: var(--bg-card-inner);
            border-radius: 3px;
        }

        .ideas-list::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        .ideas-list::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        .idea-item {
            padding: var(--spacing-lg);
            background: linear-gradient(135deg, var(--bg-card-inner), var(--bg-card));
            border: 1px solid var(--border-color);
            border-radius: var(--radius-inner);
            position: relative;
            overflow: hidden;
            transition: all var(--transition-base);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: var(--spacing-md);
        }

        .idea-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 3px;
            height: 100%;
            background: linear-gradient(180deg, #008080, #00B3B3);
            opacity: 0;
            transition: opacity var(--transition-base);
        }

        .idea-item:hover {
            border-color: var(--brand-primary);
            background: linear-gradient(135deg, var(--bg-card), var(--bg-card-inner));
            box-shadow: 0 4px 16px rgba(0, 128, 128, 0.1);
        }

        .idea-item:hover::before {
            opacity: 1;
        }

        .idea-content {
            flex: 1;
            position: relative;
            z-index: 1;
        }

        .idea-text {
            color: var(--text-primary);
            margin-bottom: var(--spacing-sm);
            line-height: 1.5;
        }

        .idea-timestamp {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .idea-actions {
            display: flex;
            gap: var(--spacing-sm);
            position: relative;
            z-index: 1;
        }

        .idea-delete {
            width: 32px;
            height: 32px;
            padding: 0;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: var(--radius-inner);
            color: var(--status-error);
            font-size: 1.25rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-base);
            line-height: 1;
        }

        .idea-delete:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: var(--status-error);
            transform: scale(1.1);
        }

        /* Empty state */
        .ideas-empty {
            text-align: center;
            padding: var(--spacing-xl);
            color: var(--text-muted);
        }

        .ideas-empty-icon {
            font-size: 2.5rem;
            margin-bottom: var(--spacing-md);
            opacity: 0.5;
        }

        /* ========================================
           FOOTER
           ======================================== */
        footer {
            background: var(--bg-card);
            border-top: 1px solid var(--border-color);
            padding: var(--spacing-xl);
            margin-top: var(--spacing-2xl);
        }

        .footer-container {
            max-width: 1600px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: var(--spacing-xl);
        }

        .footer-section h4 {
            margin-bottom: var(--spacing-md);
            color: var(--text-primary);
        }

        .footer-section p,
        .footer-section a {
            font-size: 0.875rem;
            color: var(--text-muted);
            line-height: 1.8;
        }

        .footer-section a:hover {
            color: var(--brand-primary);
        }

        .team-members {
            display: flex;
            gap: var(--spacing-sm);
            margin-top: var(--spacing-md);
        }

        .team-avatar {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #008080, #00B3B3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--bg-primary);
            border: 2px solid var(--border-color);
        }

        .footer-divider {
            grid-column: 1 / -1;
            height: 1px;
            background: var(--border-color);
            margin: var(--spacing-lg) 0;
        }

        .footer-bottom {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: var(--spacing-lg);
            border-top: 1px solid var(--border-color);
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .footer-links {
            display: flex;
            gap: var(--spacing-lg);
        }

        /* ========================================
           RESPONSIVE BREAKPOINTS
           ======================================== */
        @media (max-width: 1024px) {
            main {
                padding: var(--spacing-lg);
            }

            .header-container {
                flex-wrap: wrap;
            }

            .header-title {
                flex: 0 0 100%;
                order: 1;
                text-align: left;
            }

            .logo {
                order: 0;
                flex: 0 1 auto;
            }

            .header-actions {
                order: 2;
                width: 100%;
                justify-content: space-between;
                margin-top: var(--spacing-lg);
            }

            h1 { font-size: 2rem; }
            h2 { font-size: 1.75rem; }
            h3 { font-size: 1.375rem; }

            .kpi-value {
                font-size: 2rem;
            }

            .timeline-phases {
                grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            }

            .content-cards-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            }

            .charts-container {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            main {
                padding: var(--spacing-lg);
            }

            header {
                padding: var(--spacing-lg) var(--spacing-lg);
            }

            .header-container {
                flex-direction: column;
                gap: var(--spacing-lg);
            }

            .logo {
                width: 100%;
                justify-content: center;
            }

            .header-title {
                text-align: center;
            }

            .header-title h1 {
                font-size: 1.5rem;
            }

            .header-actions {
                width: 100%;
                justify-content: space-around;
            }

            .section-title {
                font-size: 1.25rem;
            }

            h1 { font-size: 1.75rem; }
            h2 { font-size: 1.5rem; }
            h3 { font-size: 1.25rem; }

            .kpi-grid {
                grid-template-columns: 1fr;
            }

            .kpi-value {
                font-size: 1.75rem;
            }

            .timeline {
                padding: var(--spacing-lg);
            }

            .timeline-phases {
                grid-template-columns: 1fr;
                gap: var(--spacing-md);
            }

            .phase-card {
                padding: var(--spacing-md);
            }

            .content-cards-grid {
                grid-template-columns: 1fr;
            }

            .documents-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .charts-container {
                grid-template-columns: 1fr;
            }

            .chart-wrapper {
                height: 250px;
            }

            .ideas-input-row {
                flex-direction: column;
            }

            .ideas-submit {
                width: 100%;
            }

            .footer-container {
                grid-template-columns: 1fr;
            }

            .footer-bottom {
                flex-direction: column;
                gap: var(--spacing-lg);
            }

            .footer-links {
                flex-direction: column;
                gap: var(--spacing-md);
            }
        }

        @media (max-width: 480px) {
            main {
                padding: var(--spacing-md);
            }

            header {
                padding: var(--spacing-md);
            }

            .logo {
                font-size: 1.25rem;
            }

            .logo-icon {
                width: 36px;
                height: 36px;
                font-size: 1rem;
            }

            .header-title h1 {
                font-size: 1.25rem;
            }

            .header-date {
                font-size: 0.75rem;
            }

            .section-title {
                font-size: 1.125rem;
            }

            h1 { font-size: 1.5rem; }
            h2 { font-size: 1.25rem; }
            h3 { font-size: 1.125rem; }

            .kpi-card {
                padding: var(--spacing-md);
            }

            .kpi-value {
                font-size: 1.5rem;
            }

            .timeline {
                padding: var(--spacing-md);
            }

            .timeline-phases {
                grid-template-columns: 1fr;
                gap: var(--spacing-sm);
            }

            .content-cards-grid {
                grid-template-columns: 1fr;
            }

            .documents-grid {
                grid-template-columns: 1fr;
            }

            .document-icon {
                font-size: 2rem;
            }

            .deliverable-item {
                padding: var(--spacing-sm);
                gap: var(--spacing-md);
            }

            .deliverable-checkbox {
                width: 20px;
                height: 20px;
            }

            .ideas-container {
                padding: var(--spacing-md);
            }

            .idea-item {
                flex-direction: column;
            }

            .idea-actions {
                width: 100%;
                justify-content: flex-end;
            }

            .footer-container {
                grid-template-columns: 1fr;
                gap: var(--spacing-lg);
            }

            .footer-section h4 {
                font-size: 0.875rem;
            }
        }

        /* ========================================
           PRINT STYLES
           ======================================== */
        @media print {
            header {
                position: relative;
                box-shadow: none;
                border-bottom: 2px solid var(--border-color);
            }

            main {
                padding: 0;
            }

            .section {
                page-break-inside: avoid;
                margin-bottom: 40px;
            }

            .kpi-card,
            .phase-card,
            .content-card,
            .document-card,
            .deliverable-item,
            .idea-item {
                border: 1px solid var(--border-color);
                page-break-inside: avoid;
            }

            .header-actions,
            .calendar-nav,
            .ideas-input-row,
            .ideas-submit,
            .idea-delete,
            .kpi-breakdown-toggle {
                display: none;
            }

            .chart-wrapper {
                background: white;
            }

            footer {
                margin-top: 40px;
                border-top: 2px solid var(--border-color);
            }
        }

        /* ========================================
           UTILITY CLASSES
           ======================================== */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }

        .no-data {
            text-align: center;
            padding: var(--spacing-2xl) var(--spacing-lg);
            color: var(--text-muted);
        }

        .loading {
            position: relative;
            pointer-events: none;
            opacity: 0.6;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--border-color);
            border-top-color: var(--brand-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

    </style>
</head>
